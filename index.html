<style>
:root{
  --ink:#e8edf5;
  --paper:#06080d;
  --cream:#0c1018;
  --card:rgba(12,18,32,.65);
  --card-solid:#0c1220;
  --border:rgba(100,180,255,.08);
  --accent:#00d4ff;
  --accent-glow:rgba(0,212,255,.2);
  --accent-dark:#00a8cc;
  --accent2:#a855f7;
  --accent2-glow:rgba(168,85,247,.2);
  --sage:#00ff88;
  --sage-glow:rgba(0,255,136,.15);
  --sage-light:rgba(0,255,136,.06);
  --muted:rgba(180,200,230,.5);
  --font-display:'Outfit',sans-serif;
  --font-body:'Outfit',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --glow-sm:0 0 20px rgba(0,212,255,.12);
  --glow-md:0 0 40px rgba(0,212,255,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);line-height:1.6;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* Animated background mesh */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  z-index:-1;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(0,212,255,.05) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(168,85,247,.04) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 50% 90%, rgba(0,255,136,.03) 0%, transparent 50%);
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  z-index:-2;
  background-image:radial-gradient(rgba(100,180,255,.07) 1px, transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 70%);
}

/* Navbar */
.navbar{
  background:rgba(6,8,13,.8);
  backdrop-filter:blur(24px) saturate(1.8);
  border-bottom:1px solid rgba(100,180,255,.06);
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 30px rgba(0,0,0,.3), inset 0 -1px 0 rgba(100,180,255,.05);
  transition:all .3s;
}
.nav-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:var(--font-body);font-size:1.5rem;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;transition:opacity .2s;}
.logo:hover{opacity:.8;}
.nav-btn{
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color:#fff !important;padding:8px 20px;border-radius:10px;
  font-size:.82rem;font-weight:600;transition:all .3s;
  cursor:pointer;border:none;font-family:var(--font-body);
  box-shadow:0 2px 16px var(--accent-glow), 0 0 40px rgba(0,212,255,.08);
}
.nav-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--accent-glow);}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--card-solid);border:1px solid var(--border);
  border-radius:20px;padding:36px;max-width:420px;width:90%;
  position:relative;box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:modalIn .3s cubic-bezier(.16,1,.3,1);
}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal h2{font-family:var(--font-display);font-size:1.4rem;margin-bottom:6px;}
.modal>p{font-size:.9rem;color:var(--muted);margin-bottom:20px;}
.modal-close{position:absolute;top:14px;right:18px;font-size:1.4rem;cursor:pointer;color:var(--muted);background:none;border:none;font-family:var(--font-body);transition:color .2s;}
.modal-close:hover{color:var(--ink);}
.modal label{display:block;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
.modal input{
  width:100%;
  padding:11px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  font-family:var(--font-body);
  font-size:.9rem;
  margin-bottom:14px;
  outline:none;
  transition:all .2s;
  background:rgba(255,255,255,.05);
  color:var(--ink);
}
.modal input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.modal button[type=submit]{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color:#fff;
  border:none;
  border-radius:10px;
  font-family:var(--font-body);
  font-weight:600;
  font-size:.95rem;
  cursor:pointer;
  transition:all .3s;
  box-shadow:0 2px 16px var(--accent-glow), 0 0 40px rgba(0,212,255,.08);
}
.modal button[type=submit]:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 20px var(--accent-glow);
}
.modal .note{font-size:.72rem;color:var(--muted);text-align:center;margin-top:10px;}
.modal .success-msg{text-align:center;padding:20px 0;}
.modal .success-msg .check{font-size:2.5rem;margin-bottom:10px;}
.modal .success-msg h3{font-family:var(--font-display);font-size:1.2rem;margin-bottom:6px;}
.modal .success-msg p{font-size:.9rem;color:var(--muted);}

/* Hero */
.hero{
  text-align:center;padding:80px 24px 48px;
  position:relative;
}
.hero::before{
  content:'';
  position:absolute;
  top:-50%;
  left:50%;
  transform:translateX(-50%);
  width:800px;
  height:800px;
  background:radial-gradient(circle, rgba(0,212,255,.12) 0%, transparent 70%);
  pointer-events:none;
  animation:heroPulse 8s ease-in-out infinite;
}
@keyframes heroPulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.1);}}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(2.4rem,5.5vw,3.8rem);
  line-height:1.1;
  max-width:750px;
  margin:0 auto 16px;
  position:relative;
  background:linear-gradient(135deg, #fff 0%, rgba(0,212,255,.8) 50%, rgba(168,85,247,.6) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero h1 em{
  font-style:italic;
  background:linear-gradient(135deg, var(--accent) 0%, #c084fc 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero p{
  font-size:1.05rem;
  color:var(--muted);
  max-width:520px;
  margin:0 auto 32px;
  font-weight:300;
}

/* Search */
.search-box{
  max-width:520px;
  margin:0 auto 24px;
  display:flex;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  transition:all .3s;
  backdrop-filter:blur(10px);
}
